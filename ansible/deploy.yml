---
# Configure a blank Ubuntu EC2 into the production application server.
# Target group [web] comes from the inventory generated by the CI Bridge (#12).
# Secrets are passed at runtime via --extra-vars by the pipeline (#13),
# never hardcoded. Required extra-vars:
#   registry_host, registry_username, registry_password,
#   mysql_root_password, mysql_database, admin_email, admin_password,
#   jwt_secret, image_tag, app_public_ip
- name: Deploy the inscription stack
  hosts: web
  become: true
  vars:
    project_dir: /home/ubuntu/inscription-stack

  tasks:
    # 0. Small instances (1 GB RAM) need swap so the React dev server + MySQL fit.
    - name: Check whether swap is already enabled
      ansible.builtin.command: swapon --show
      register: swap_status
      changed_when: false

    - name: Create and enable a 2G swap file
      when: "'/swapfile' not in swap_status.stdout"
      block:
        - name: Allocate the swap file
          ansible.builtin.command: fallocate -l 2G /swapfile
          args:
            creates: /swapfile
        - name: Secure the swap file
          ansible.builtin.file:
            path: /swapfile
            mode: "0600"
        - name: Format the swap area
          ansible.builtin.command: mkswap /swapfile
        - name: Enable the swap file
          ansible.builtin.command: swapon /swapfile

    # 1. Install the Docker runtime + the compose plugin.
    - name: Install Docker and the compose plugin
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker.io
          - docker-compose-v2
        state: present

    # 2. The private registry uses a self-signed certificate. Trust it as an
    #    insecure registry so docker can pull images from it.
    - name: Trust the private registry (self-signed certificate)
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          { "insecure-registries": ["{{ registry_host }}"] }
        mode: "0644"
      notify: Restart docker

    - name: Apply the docker config before logging in
      ansible.builtin.meta: flush_handlers

    # 3. Authenticate against the private registry (password via stdin, never logged).
    - name: Log in to the private registry
      ansible.builtin.command:
        cmd: docker login {{ registry_host }} -u {{ registry_username }} --password-stdin
        stdin: "{{ registry_password }}"
      register: docker_login
      changed_when: "'Login Succeeded' in docker_login.stdout"
      no_log: true

    # 4. Lay down the production stack: compose file, SQL migrations and the .env.
    - name: Create the project directory
      ansible.builtin.file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy the production compose file
      ansible.builtin.copy:
        src: ../app/docker-mysql/docker-compose.prod.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Copy the SQL migrations
      ansible.builtin.copy:
        src: ../app/docker-mysql/sqlfiles/
        dest: "{{ project_dir }}/sqlfiles/"
        mode: "0644"

    - name: Generate the .env consumed by docker compose
      ansible.builtin.copy:
        dest: "{{ project_dir }}/.env"
        mode: "0600"
        content: |
          REGISTRY_HOST={{ registry_host }}
          TAG={{ image_tag }}
          APP_PUBLIC_IP={{ app_public_ip }}
          MYSQL_ROOT_PASSWORD={{ mysql_root_password }}
          MYSQL_DATABASE={{ mysql_database }}
          ADMIN_EMAIL={{ admin_email }}
          ADMIN_PASSWORD={{ admin_password }}
          JWT_SECRET={{ jwt_secret }}
      no_log: true

    # 5 + 6. Pull the images from the registry, then start the stack.
    - name: Pull the images from the private registry
      ansible.builtin.command: docker compose pull
      args:
        chdir: "{{ project_dir }}"
      changed_when: true

    - name: Start the stack
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"
      changed_when: true

  handlers:
    - name: Restart docker
      ansible.builtin.service:
        name: docker
        state: restarted
