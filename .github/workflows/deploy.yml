# Zero-Touch orchestration pipeline — manual trigger (1 click).
# One single job so the tfstate and generated files (inventory, key.pem)
# persist between steps (state local to the runner = ephemeral infra).
# Mirrors the 5 manual steps: Build&Push -> Provision -> Bridge -> Deploy -> Validate.
name: Deploy (Zero Touch)

on:
  workflow_dispatch:

env:
  # AWS (Terraform)
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
  # Private registry
  REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  # Application secrets
  MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
  MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  # Image tag = commit SHA
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- 1. BUILD & PUSH (issue #10) ----------
      - name: Trust the private registry (self-signed cert)
        run: |
          echo "{ \"insecure-registries\": [\"$REGISTRY_HOST\"] }" | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Log in to the private registry
        run: echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin

      - name: Build and push the images (api + webapp)
        working-directory: app
        run: |
          docker build -f docker-mysql/api/Dockerfile    -t "$REGISTRY_HOST/inscription-api:$IMAGE_TAG"    -t "$REGISTRY_HOST/inscription-api:latest" .
          docker build -f docker-mysql/webapp/Dockerfile -t "$REGISTRY_HOST/inscription-webapp:$IMAGE_TAG" -t "$REGISTRY_HOST/inscription-webapp:latest" .
          docker push "$REGISTRY_HOST/inscription-api:$IMAGE_TAG"
          docker push "$REGISTRY_HOST/inscription-api:latest"
          docker push "$REGISTRY_HOST/inscription-webapp:$IMAGE_TAG"
          docker push "$REGISTRY_HOST/inscription-webapp:latest"

      # ---------- 2. PROVISION (issue #11) ----------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform apply (infra/)
        run: |
          terraform -chdir=infra init -input=false
          terraform -chdir=infra apply -auto-approve -input=false

      # ---------- 3. BRIDGE (issue #12) ----------
      - name: Generate inventory.ini + key.pem
        run: |
          SERVER_IP=$(terraform -chdir=infra output -raw instance_public_ip)
          echo "SERVER_IP=$SERVER_IP" >> "$GITHUB_ENV"
          terraform -chdir=infra output -raw ssh_private_key > key.pem
          chmod 600 key.pem
          echo "[web]" > inventory.ini
          echo "$SERVER_IP ansible_user=ubuntu ansible_ssh_private_key_file=key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory.ini

      # ---------- 4. DEPLOY (issue #13) ----------
      - name: Install Ansible
        run: |
          python3 -m pip install --user ansible
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Wait for SSH to be ready
        run: |
          for i in $(seq 1 20); do
            ssh -i key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=10 "ubuntu@$SERVER_IP" 'echo ok' && exit 0
            echo "SSH not ready, retry $i..."; sleep 15
          done
          echo "SSH never came up"; exit 1

      - name: Run the Ansible playbook
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml \
            -e registry_host="$REGISTRY_HOST" \
            -e registry_username="$REGISTRY_USERNAME" \
            -e registry_password="$REGISTRY_PASSWORD" \
            -e image_tag="$IMAGE_TAG" \
            -e app_public_ip="$SERVER_IP" \
            -e mysql_root_password="$MYSQL_ROOT_PASSWORD" \
            -e mysql_database="$MYSQL_DATABASE" \
            -e admin_email="$ADMIN_EMAIL" \
            -e admin_password="$ADMIN_PASSWORD" \
            -e jwt_secret="$JWT_SECRET"

      # ---------- 5. VALIDATE (issue #14) — outside Ansible ----------
      - name: Validate the deployment (curl front + api)
        run: |
          set -uo pipefail
          ok_api=""; ok_web=""
          for i in $(seq 1 20); do
            code_api=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "http://$SERVER_IP:8000/docs" || true)
            code_web=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "http://$SERVER_IP:3000" || true)
            echo "try $i -> api=$code_api web=$code_web"
            case "$code_api" in 2??|3??) ok_api=1;; esac
            case "$code_web" in 2??|3??) ok_web=1;; esac
            { [ -n "$ok_api" ] && [ -n "$ok_web" ]; } && break
            sleep 15
          done
          if [ -z "$ok_api" ] || [ -z "$ok_web" ]; then
            echo "Validation failed (api=$code_api web=$code_web)"; exit 1
          fi
          {
            echo "## ✅ Déploiement réussi"
            echo ""
            echo "- **Frontend** : http://$SERVER_IP:3000"
            echo "- **API**      : http://$SERVER_IP:8000/docs"
          } >> "$GITHUB_STEP_SUMMARY"
